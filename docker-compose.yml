# ============================================================
# docker-compose.yml — Three-Tier Setup (Stage 7)
#
# Defines three services:
#   db       — PostgreSQL database (persistent volume)
#   pgadmin  — pgAdmin 4 web UI for browsing the database
#   backend  — SAP CAP service connected to PostgreSQL (optional —
#              use 'npm run watch:pg' locally instead for development)
#
# Typical Stage 7 usage (run CAP locally, DB + pgAdmin in Docker):
#   docker compose up -d db pgadmin   # start just the database + pgAdmin
#   npm run watch:pg                  # run CAP locally against the DB
#
# Or run everything in Docker:
#   docker compose up -d              # start all three services
#
# Other useful commands:
#   docker compose ps                 # check what's running
#   docker compose logs -f pgadmin   # tail pgAdmin logs
#   docker compose down              # stop and remove containers
#   docker compose down -v           # also delete the data volume
#
# URLs when running:
#   http://localhost:4004/odata/v4/catalog/Products  (CAP OData)
#   http://localhost:5050                             (pgAdmin)
#
# ABAP analogy:
#   db      = the database server (like HANA or DB2)
#   backend = the application server (like the ABAP AS)
#   This docker-compose.yml = the system landscape definition
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  #
  # Uses the official PostgreSQL Docker image.
  # Data is stored in a named volume (odata-pg-data) so it
  # persists across container restarts.
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       odata_learn
      POSTGRES_USER:     cap_user
      POSTGRES_PASSWORD: cap_password
    volumes:
      - odata-pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Expose PostgreSQL port (optional — only needed for direct DB access)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap_user -d odata_learn"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # CAP Backend Service
  #
  # Builds from src/backend/ using the Dockerfile there.
  # Waits for PostgreSQL to be healthy before starting.
  #
  # Environment variables switch CAP from SQLite to PostgreSQL.
  # The CDS data model (schema.cds) is unchanged — only the
  # database connection changes.
  #
  # ABAP analogy: Like switching the system DB connection profile
  # from a test system to a production database — the ABAP code
  # doesn't change, only the infrastructure config.
  # ----------------------------------------------------------
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      # Tell CAP to use PostgreSQL instead of SQLite
      CDS_REQUIRES_DB_KIND:                  postgres
      CDS_REQUIRES_DB_CREDENTIALS_HOST:      db
      CDS_REQUIRES_DB_CREDENTIALS_PORT:      5432
      CDS_REQUIRES_DB_CREDENTIALS_DATABASE:  odata_learn
      CDS_REQUIRES_DB_CREDENTIALS_USER:      cap_user
      CDS_REQUIRES_DB_CREDENTIALS_PASSWORD:  cap_password
      NODE_ENV:                              production
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  # pgAdmin — PostgreSQL browser UI
  #
  # Lets you inspect the raw database tables while the CAP
  # service is running (or stopped). The key demonstration:
  # query the products table in SQL, then hit the OData endpoint
  # and see the same rows — showing CAP is just a layer on top.
  #
  # URL:      http://localhost:5050
  # Email:    admin@example.com
  # Password: admin
  #
  # To connect to the database inside pgAdmin:
  #   Object → Register → Server
  #   General tab → Name: learn-odata
  #   Connection tab → Host: db  Port: 5432
  #                    Database: odata_learn
  #                    Username: cap_user  Password: cap_password
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

# Named volume — PostgreSQL data persists here between restarts
volumes:
  odata-pg-data:
